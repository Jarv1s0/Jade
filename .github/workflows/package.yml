name: Package Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包扩展程序
        id: pack
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ZIP_NAME="Jade-v${VERSION}.zip"
          # 仅将必要的文件和文件夹打包到 zip 中
          # 排除 .git, .github, .gitignore 等开发环境文件
          zip -r "$ZIP_NAME" \
            manifest.json \
            _locales/ \
            bookmarks/ \
            newtab/ \
            shared/ \
            privacy.html \
            README.md
          
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传 ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Jade ${{ github.event.inputs.version }}
          files: ${{ steps.pack.outputs.zip_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
