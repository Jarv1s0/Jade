name: Package Extension

on:
  workflow_dispatch: # 支持手动触发

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包扩展程序
        run: |
          # 仅将必要的文件和文件夹打包到 zip 中
          # 排除 .git, .github, .gitignore 等开发环境文件
          zip -r Jade-v${{ github.run_number }}.zip \
            manifest.json \
            bookmarks/ \
            newtab/ \
            privacy.html \
            README.md

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Jade-Extension-Package
          path: Jade-v${{ github.run_number }}.zip
          retention-days: 7 # 产物保留 7 天
