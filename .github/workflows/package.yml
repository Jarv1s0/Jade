name: Package Extension

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 运行验证
        run: npm run verify

  package:
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 读取扩展版本
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content -LiteralPath manifest.json -Raw | ConvertFrom-Json
          $version = [string]$manifest.version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'manifest.json version is empty'
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=release/Jade-v$version.zip" >> $env:GITHUB_OUTPUT

      - name: 打包扩展程序
        shell: pwsh
        run: ./release/build.ps1 -KeepLatest 0

      - name: 创建 Release 并上传 ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Jade ${{ steps.version.outputs.version }}
          files: ${{ steps.version.outputs.zip_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
